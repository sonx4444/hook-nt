name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S . -B build -A x64
      - name: Build
        run: cmake --build build --config Release
      - name: Validate injected DLL contract
        run: powershell -ExecutionPolicy Bypass -File .\scripts\validate-apiscope-hooks.ps1 .\build\bin\Release\apiscope-hooks.dll
      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure
      - name: Runtime smoke test
        run: powershell -ExecutionPolicy Bypass -File .\scripts\smoke.ps1 -SkipBuild
      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist\apiscope-windows-x64
          Copy-Item build\bin\Release\apiscope.exe dist\apiscope-windows-x64
          Copy-Item build\bin\Release\apiscope-hooks.dll dist\apiscope-windows-x64
          Copy-Item build\bin\Release\test_file_ops.exe dist\apiscope-windows-x64
          Copy-Item build\bin\Release\test_multithread_file_ops.exe dist\apiscope-windows-x64
          Copy-Item build\bin\Release\test_delayed_bcrypt.exe dist\apiscope-windows-x64
          Copy-Item README.md dist\apiscope-windows-x64
          Copy-Item LICENSE dist\apiscope-windows-x64
          Copy-Item THIRD_PARTY_NOTICES.md dist\apiscope-windows-x64
          Compress-Archive -Path dist\apiscope-windows-x64 -DestinationPath dist\apiscope-windows-x64.zip
          (Get-FileHash dist\apiscope-windows-x64.zip -Algorithm SHA256).Hash + "  apiscope-windows-x64.zip" | Out-File dist\SHA256SUMS.txt -Encoding ascii
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" dist/apiscope-windows-x64.zip dist/SHA256SUMS.txt --generate-notes --title "${{ github.ref_name }}"
