name: build

on:
  push:
  pull_request:

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S . -B build -A x64
      - name: Build
        run: cmake --build build --config Release
      - name: Validate injected DLL contract
        run: powershell -ExecutionPolicy Bypass -File .\scripts\validate-apiscope-hooks.ps1 .\build\bin\Release\apiscope-hooks.dll
      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure
      - name: Runtime smoke test
        run: powershell -ExecutionPolicy Bypass -File .\scripts\smoke.ps1 -SkipBuild
      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: apiscope-windows-x64
          path: |
            build/bin/Release/apiscope.exe
            build/bin/Release/apiscope-hooks.dll
            build/bin/Release/test_file_ops.exe
            build/bin/Release/test_multithread_file_ops.exe
            build/bin/Release/test_delayed_bcrypt.exe
