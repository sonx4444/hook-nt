name: build

on:
  push:
  pull_request:

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S . -B build -A x64
      - name: Build
        run: cmake --build build --config Release
      - name: Test
        run: ctest --test-dir build -C Release --output-on-failure
      - name: Runtime smoke test
        run: powershell -ExecutionPolicy Bypass -File .\scripts\smoke.ps1 -SkipBuild
      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: hooknt-windows-x64
          path: |
            build/bin/Release/hooknt.exe
            build/bin/Release/ntdlln.dll
            build/bin/Release/test_file_ops.exe
